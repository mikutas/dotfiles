name: test

on: pull_request

jobs:
  aqua:
    runs-on: ubuntu-slim
    steps:
      - uses: mikutas/my-aqua-installer@main
        with:
          aqua_opts: "-l=false" # disable lazy install

  asdf:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47 # v4.0.1
